apiVersion: v1
kind: PodDisruptionBudget
metadata:
  name: zhushou-gateway-pdb
  namespace: default
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: zhushou
---
apiVersion: v1
kind: Service
metadata:
  name: zhushou-gateway
  namespace: default
  labels:
    app: zhushou
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      protocol: TCP
    - name: ws
      port: 18790
      targetPort: 18790
      protocol: TCP
  selector:
    app: zhushou
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: zhushou-gateway-netpol
  namespace: default
spec:
  podSelector:
    matchLabels:
      app: zhushou
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: istio-system
      ports:
        - port: 3000
          protocol: TCP
        - port: 18790
          protocol: TCP
    - from:
        - namespaceSelector:
            matchLabels:
              name: monitoring
      ports:
        - port: 3000
          protocol: TCP
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - port: 443
          protocol: TCP
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
