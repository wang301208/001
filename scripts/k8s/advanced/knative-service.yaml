apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: zhushou-channel-handler
  namespace: default
  labels:
    app: zhushou
    component: channel-handler
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "100"
        autoscaling.knative.dev/target: "10"
        autoscaling.knative.dev/scaleToZeroPodRetentionPeriod: "60s"
    spec:
      containerConcurrency: 1
      timeoutSeconds: 300
      serviceAccountName: zhushou-channel-handler
      containers:
        - image: ghcr.io/wang301208/zhushou:slim
          ports:
            - name: http1
              containerPort: 3000
          env:
            - name: ZHUSHOU_MODE
              value: "channel-handler"
            - name: ZHUSHOU_PORT
              value: "3000"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3000
          readinessProbe:
            httpGet:
              path: /readyz
              port: 3000
