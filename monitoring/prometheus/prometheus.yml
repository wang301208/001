global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/assistant-alerts.yml

scrape_configs:
  - job_name: assistant-gateway
    metrics_path: /metrics
    static_configs:
      - targets:
          - assistant:3000

  - job_name: assistant-health
    metrics_path: /healthz
    static_configs:
      - targets:
          - assistant:3000
