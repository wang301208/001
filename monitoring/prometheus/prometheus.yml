global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/zhushou-alerts.yml

scrape_configs:
  - job_name: zhushou-gateway
    metrics_path: /metrics
    static_configs:
      - targets:
          - zhushou:3000

  - job_name: zhushou-health
    metrics_path: /healthz
    static_configs:
      - targets:
          - zhushou:3000
