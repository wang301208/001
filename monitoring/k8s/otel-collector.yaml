apiVersion: v1
kind: ConfigMap
metadata:
  name: assistant-otel-collector-config
  labels:
    app: assistant-otel-collector
data:
  otel-collector.yml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
    processors:
      batch: {}
      memory_limiter:
        check_interval: 5s
        limit_mib: 256
    exporters:
      logging:
        verbosity: normal
    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [logging]
        metrics:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [logging]
        logs:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [logging]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: assistant-otel-collector
  labels:
    app: assistant-otel-collector
spec:
  replicas: 1
  selector:
    matchLabels:
      app: assistant-otel-collector
  template:
    metadata:
      labels:
        app: assistant-otel-collector
    spec:
      automountServiceAccountToken: false
      containers:
        - name: otel-collector
          image: otel/opentelemetry-collector-contrib:0.114.0
          args:
            - --config=/etc/otelcol/otel-collector.yml
          ports:
            - name: otlp-grpc
              containerPort: 4317
            - name: otlp-http
              containerPort: 4318
          volumeMounts:
            - name: config
              mountPath: /etc/otelcol/otel-collector.yml
              subPath: otel-collector.yml
      volumes:
        - name: config
          configMap:
            name: assistant-otel-collector-config
---
apiVersion: v1
kind: Service
metadata:
  name: assistant-otel-collector
  labels:
    app: assistant-otel-collector
spec:
  type: ClusterIP
  selector:
    app: assistant-otel-collector
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: otlp-grpc
    - name: otlp-http
      port: 4318
      targetPort: otlp-http
