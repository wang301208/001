apiVersion: v1
kind: ConfigMap
metadata:
  name: zhushou-prometheus-config
  labels:
    app: zhushou-prometheus
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
    rule_files:
      - /etc/prometheus/rules/zhushou-alerts.yml
    scrape_configs:
      - job_name: zhushou-gateway
        metrics_path: /metrics
        static_configs:
          - targets:
              - zhushou:3000
      - job_name: zhushou-health
        metrics_path: /healthz
        static_configs:
          - targets:
              - zhushou:3000
  zhushou-alerts.yml: |
    groups:
      - name: zhushou.rules
        rules:
          - alert: ZhushouGatewayDown
            expr: up{job="zhushou-gateway"} == 0
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: Zhushou gateway is down
              description: Prometheus cannot scrape the zhushou gateway for more than two minutes.
          - alert: ZhushouHealthProbeDown
            expr: up{job="zhushou-health"} == 0
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: Zhushou health endpoint is unavailable
              description: The /healthz endpoint is not responding through the service endpoint.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zhushou-prometheus
  labels:
    app: zhushou-prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zhushou-prometheus
  template:
    metadata:
      labels:
        app: zhushou-prometheus
    spec:
      automountServiceAccountToken: false
      containers:
        - name: prometheus
          image: prom/prometheus:v2.55.1
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
            - --web.enable-lifecycle
          ports:
            - name: http
              containerPort: 9090
          readinessProbe:
            httpGet:
              path: /-/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus/prometheus.yml
              subPath: prometheus.yml
            - name: config
              mountPath: /etc/prometheus/rules/zhushou-alerts.yml
              subPath: zhushou-alerts.yml
            - name: data
              mountPath: /prometheus
      volumes:
        - name: config
          configMap:
            name: zhushou-prometheus-config
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: zhushou-prometheus
  labels:
    app: zhushou-prometheus
spec:
  type: ClusterIP
  selector:
    app: zhushou-prometheus
  ports:
    - name: http
      port: 9090
      targetPort: http
