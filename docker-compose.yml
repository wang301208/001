name: assistant

services:
  assistant-gateway:
    image: ${ASSISTANT_IMAGE:-assistant:local}
    environment:
      HOME: /home/node
      TERM: xterm-256color
      ASSISTANT_GATEWAY_TOKEN: ${ASSISTANT_GATEWAY_TOKEN:-}
      ASSISTANT_ALLOW_INSECURE_PRIVATE_WS: ${ASSISTANT_ALLOW_INSECURE_PRIVATE_WS:-}
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY:-}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY:-}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE:-}
      TZ: ${ASSISTANT_TZ:-UTC}
    volumes:
      - ${ASSISTANT_CONFIG_DIR:-./.assistant}:/home/node/.assistant
      - ${ASSISTANT_WORKSPACE_DIR:-./workspace}:/home/node/.assistant/workspace
      ## Uncomment the lines below to enable sandbox isolation
      ## (agents.defaults.sandbox). Requires Docker CLI in the image
      ## (build with --build-arg ASSISTANT_INSTALL_DOCKER_CLI=1) or use
      ## scripts/docker/setup.sh with ASSISTANT_SANDBOX=1 for automated setup.
      ## Set DOCKER_GID to the host's docker group GID (run: stat -c '%g' /var/run/docker.sock).
      # - /var/run/docker.sock:/var/run/docker.sock
    # group_add:
    #   - "${DOCKER_GID:-999}"
    ports:
      - "${ASSISTANT_GATEWAY_PORT:-3000}:3000"
      - "${ASSISTANT_BRIDGE_PORT:-18790}:18790"
    init: true
    restart: unless-stopped
    command:
      [
        "node",
        "dist/index.js",
        "gateway",
        "--bind",
        "${ASSISTANT_GATEWAY_BIND:-lan}",
        "--port",
        "3000",
      ]
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  assistant-cli:
    image: ${ASSISTANT_IMAGE:-assistant:local}
    network_mode: "service:assistant-gateway"
    cap_drop:
      - NET_RAW
      - NET_ADMIN
    security_opt:
      - no-new-privileges:true
    environment:
      HOME: /home/node
      TERM: xterm-256color
      ASSISTANT_GATEWAY_TOKEN: ${ASSISTANT_GATEWAY_TOKEN:-}
      ASSISTANT_ALLOW_INSECURE_PRIVATE_WS: ${ASSISTANT_ALLOW_INSECURE_PRIVATE_WS:-}
      BROWSER: echo
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY:-}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY:-}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE:-}
      TZ: ${ASSISTANT_TZ:-UTC}
    volumes:
      - ${ASSISTANT_CONFIG_DIR:-./.assistant}:/home/node/.assistant
      - ${ASSISTANT_WORKSPACE_DIR:-./workspace}:/home/node/.assistant/workspace
    stdin_open: true
    tty: true
    init: true
    entrypoint: ["node", "dist/index.js"]
    depends_on:
      - assistant-gateway
