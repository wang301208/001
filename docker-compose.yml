name: zhushou

services:
  zhushou-gateway:
    image: ${ZHUSHOU_IMAGE:-zhushou:local}
    environment:
      HOME: /home/node
      TERM: xterm-256color
      ZHUSHOU_GATEWAY_TOKEN: ${ZHUSHOU_GATEWAY_TOKEN:-}
      ZHUSHOU_ALLOW_INSECURE_PRIVATE_WS: ${ZHUSHOU_ALLOW_INSECURE_PRIVATE_WS:-}
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY:-}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY:-}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE:-}
      TZ: ${ZHUSHOU_TZ:-UTC}
    volumes:
      - ${ZHUSHOU_CONFIG_DIR:-./.zhushou}:/home/node/.zhushou
      - ${ZHUSHOU_WORKSPACE_DIR:-./workspace}:/home/node/.zhushou/workspace
      ## Uncomment the lines below to enable sandbox isolation
      ## (agents.defaults.sandbox). Requires Docker CLI in the image
      ## (build with --build-arg ZHUSHOU_INSTALL_DOCKER_CLI=1) or use
      ## scripts/docker/setup.sh with ZHUSHOU_SANDBOX=1 for automated setup.
      ## Set DOCKER_GID to the host's docker group GID (run: stat -c '%g' /var/run/docker.sock).
      # - /var/run/docker.sock:/var/run/docker.sock
    # group_add:
    #   - "${DOCKER_GID:-999}"
    ports:
      - "${ZHUSHOU_GATEWAY_PORT:-18789}:18789"
      - "${ZHUSHOU_BRIDGE_PORT:-18790}:18790"
    init: true
    restart: unless-stopped
    command:
      [
        "node",
        "dist/index.js",
        "gateway",
        "--bind",
        "${ZHUSHOU_GATEWAY_BIND:-lan}",
        "--port",
        "18789",
      ]
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:18789/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  zhushou-web:
    image: ${ZHUSHOU_WEB_IMAGE:-zhushou-web:local}
    build:
      context: .
      dockerfile: web/Dockerfile
    environment:
      ZHUSHOU_GATEWAY_UPSTREAM: http://zhushou-gateway:18789
    ports:
      - "${ZHUSHOU_WEB_PORT:-3000}:8080"
    init: true
    restart: unless-stopped
    depends_on:
      zhushou-gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8080/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

  zhushou-cli:
    image: ${ZHUSHOU_IMAGE:-zhushou:local}
    network_mode: "service:zhushou-gateway"
    cap_drop:
      - NET_RAW
      - NET_ADMIN
    security_opt:
      - no-new-privileges:true
    environment:
      HOME: /home/node
      TERM: xterm-256color
      ZHUSHOU_GATEWAY_TOKEN: ${ZHUSHOU_GATEWAY_TOKEN:-}
      ZHUSHOU_ALLOW_INSECURE_PRIVATE_WS: ${ZHUSHOU_ALLOW_INSECURE_PRIVATE_WS:-}
      BROWSER: echo
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY:-}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY:-}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE:-}
      TZ: ${ZHUSHOU_TZ:-UTC}
    volumes:
      - ${ZHUSHOU_CONFIG_DIR:-./.zhushou}:/home/node/.zhushou
      - ${ZHUSHOU_WORKSPACE_DIR:-./workspace}:/home/node/.zhushou/workspace
    stdin_open: true
    tty: true
    init: true
    entrypoint: ["node", "dist/index.js"]
    depends_on:
      - zhushou-gateway
