name: Release CD

on:
  workflow_dispatch:
    inputs:
      publish_npm:
        description: Publish the npm package after release checks
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      deploy_kubernetes:
        description: Deploy the gateway image to Kubernetes after publishing images
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      environment:
        description: GitHub environment for protected deployment secrets
        required: true
        default: production
  push:
    tags:
      - "v*"

concurrency:
  group: release-cd-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write
  id-token: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  release-check:
    name: Release Check
    runs-on: ubuntu-latest
    timeout-minutes: 60
    outputs:
      version: ${{ steps.version.outputs.version }}
      image_tag: ${{ steps.version.outputs.image_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve version and image tag
        id: version
        shell: bash
        run: |
          version="$(node -p "require('./package.json').version")"
          image_tag="${GITHUB_REF_NAME#v}"
          if [[ "${GITHUB_REF_TYPE}" != "tag" ]]; then
            image_tag="sha-${GITHUB_SHA::12}"
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${image_tag}" >> "$GITHUB_OUTPUT"

      - name: Build release artifacts
        run: pnpm build

      - name: Release package checks
        env:
          RELEASE_TAG: ${{ github.ref_type == 'tag' && github.ref_name || format('v{0}', steps.version.outputs.version) }}
          RELEASE_SHA: ${{ github.sha }}
          RELEASE_MAIN_REF: origin/main
        run: pnpm release:check

  publish-images:
    name: Publish Container Images
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs:
      - release-check

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push gateway image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.release-check.outputs.image_tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  publish-npm:
    name: Publish npm Package
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs:
      - release-check
    if: github.ref_type == 'tag' || inputs.publish_npm == 'true'
    environment: ${{ inputs.environment || 'production' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js for trusted publishing
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build package
        run: pnpm build

      - name: Publish
        run: bash scripts/assistant-npm-publish.sh --publish

      - name: Verify published package
        run: pnpm release:assistant:npm:verify-published ${{ needs.release-check.outputs.version }}

  deploy-kubernetes:
    name: Deploy Kubernetes
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs:
      - release-check
      - publish-images
    if: inputs.deploy_kubernetes == 'true'
    environment: ${{ inputs.environment || 'production' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure kubeconfig
        env:
          KUBE_CONFIG_B64: ${{ secrets.KUBE_CONFIG_B64 }}
        shell: bash
        run: |
          test -n "${KUBE_CONFIG_B64}" || { echo "KUBE_CONFIG_B64 secret is required"; exit 1; }
          mkdir -p "$HOME/.kube"
          echo "${KUBE_CONFIG_B64}" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Deploy manifests
        env:
          ASSISTANT_NAMESPACE: ${{ vars.ASSISTANT_NAMESPACE || 'assistant' }}
          ASSISTANT_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.release-check.outputs.image_tag }}
        run: bash scripts/k8s/deploy.sh

      - name: Post-deploy health and logs feedback
        env:
          ASSISTANT_NAMESPACE: ${{ vars.ASSISTANT_NAMESPACE || 'assistant' }}
        run: bash scripts/ci/post-deploy-feedback.sh

      - name: Upload deployment feedback
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deployment-feedback
          path: .artifacts/deploy-feedback/
          if-no-files-found: ignore
          retention-days: 14
