services:
  - type: web
    name: zhushou
    runtime: docker
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: ZHUSHOU_GATEWAY_PORT
        value: "8080"
      - key: ZHUSHOU_STATE_DIR
        value: /data/.zhushou
      - key: ZHUSHOU_WORKSPACE_DIR
        value: /data/workspace
      - key: ZHUSHOU_GATEWAY_TOKEN
        generateValue: true
    disk:
      name: zhushou-data
      mountPath: /data
      sizeGB: 1
