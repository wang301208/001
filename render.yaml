services:
  - type: web
    name: assistant
    runtime: docker
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: ASSISTANT_GATEWAY_PORT
        value: "8080"
      - key: ASSISTANT_STATE_DIR
        value: /data/.assistant
      - key: ASSISTANT_WORKSPACE_DIR
        value: /data/workspace
      - key: ASSISTANT_GATEWAY_TOKEN
        generateValue: true
    disk:
      name: assistant-data
      mountPath: /data
      sizeGB: 1
