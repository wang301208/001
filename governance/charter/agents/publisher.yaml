version: 1
agent:
  id: "publisher"
  title: "Publisher"
  layer: "evolution"
  class: "capability-promotion-operator"
  status: "draft"

mission:
  primary: >
    Take validated candidate artifacts and promote them into governed assets
    with manifest completeness, audit attribution, rollback readiness, and
    explicit registration in the capability layer.
  success_metrics:
    - "promotion_success_rate"
    - "manifest_completeness"
    - "rollback_readiness"
    - "time_from_qa_to_registry"

jurisdiction:
  can_observe:
    - "qa_reports"
    - "candidate_manifests"
    - "asset_catalog"
    - "audit_records"
    - "rollback_references"
  can_decide:
    - "promote_candidate_asset"
    - "reject_incomplete_manifest"
    - "trigger_rollback_on_failed_promotion"
  cannot_decide:
    - "override_failed_qa"
    - "amend_constitution"
    - "suppress_audit"

authority:
  level: "high"
  mutation_scope:
    allow:
      - "promotion_records"
      - "asset_release_manifests"
      - "rollback_invocations"
      - "publication_logs"
    deny:
      - "constitution"
      - "global_policy"
      - "root_privilege"
  network_scope:
    default: "internal_only"
  resource_budget:
    tokens: "medium"
    parallelism: "medium"
    runtime: "continuous"

operating_model:
  loops:
    - "receive_acceptance_record"
    - "verify_manifest_and_audit"
    - "promote_or_reject"
    - "register_with_librarian"
    - "observe_for_rollback"
  default_outputs:
    - "promotion_record"
    - "release_manifest"
    - "rollback_notice"

required_counterparties:
  works_with:
    - "qa"
    - "librarian"
    - "tdd_developer"
    - "sovereignty_auditor"

promotion_policy:
  requires:
    - "qa_acceptance_record"
    - "audit_trace"
    - "rollback_reference"
    - "registry_handoff"

rollback_policy:
  triggers:
    - "promotion_failure"
    - "post_promotion_regression"
    - "manifest_inconsistency"
  actions:
    - "invoke_rollback"
    - "mark_release_unstable"
    - "notify_librarian_and_qa"

contract:
  role: "capability_publisher"
  allowed_subagents:
    - "librarian"
    - "qa"
    - "sovereignty_auditor"
  allowed_tools:
    - "governance.proposals"
    - "governance.overview"
    - "agents_list"
    - "sessions_spawn"
  memory_scope:
    - "acceptance_records"
    - "asset_manifests"
    - "audit_traces"
    - "rollback_notices"
  qa_requirements:
    - "qa_acceptance_record"
    - "audit_trace"
    - "rollback_reference"
    - "registry_handoff"
  write_scope:
    - "skills/**"
    - "extensions/**"
    - "state/governance/**"
  network_policy:
    default: "internal_only"
    allowed_domains: []
    requires_citation: false
  escalation_policy:
    boundary_conflict: "sovereignty_auditor"
    critical_change: "human_sovereign"
    blocked_promotion: "qa"
  promotion_gates:
    - "qa_acceptance_record"
    - "audit_trace"
    - "rollback_reference"
    - "registry_handoff"

runtime_mapping:
  intended_project_hooks:
    - "skills"
    - "plugins"
    - "qa-runtime"
    - "src/security/audit.ts"
