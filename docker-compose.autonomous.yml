version: "3.8"

services:
  zhushou-autonomous:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${ZHUSHOU_PORT:-18790}:18790"
    environment:
      - ZHUSHOU_AUTONOMOUS_ENABLED=true
      - ZHUSHOU_HONO_BRIDGE=true
      - ZHUSHOU_GATEWAY_PORT=18790
      - ZHUSHOU_BIND=0.0.0.0
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18790/autonomous/status"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 256M
          cpus: "0.5"
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
      rollback_config:
        parallelism: 0
        order: stop-first
    networks:
      - zhushou-net
    restart: unless-stopped

  zhushou-gossip:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - ZHUSHOU_AUTONOMOUS_ENABLED=true
      - ZHUSHOU_HONO_BRIDGE=true
      - ZHUSHOU_GOSSIP_ENABLED=true
      - ZHUSHOU_GOSSIP_SEEDS=zhushou-autonomous:18790
      - ZHUSHOU_GATEWAY_PORT=18790
      - ZHUSHOU_BIND=0.0.0.0
      - NODE_ENV=production
    ports:
      - "18791:18790"
    depends_on:
      zhushou-autonomous:
        condition: service_healthy
    networks:
      - zhushou-net
    restart: unless-stopped
    deploy:
      mode: replicated
      replicas: 2
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - zhushou-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

  nats:
    image: nats:2-alpine
    ports:
      - "4222:4222"
      - "8222:8222"
    command: ["--jetstream", "--store_dir", "/data"]
    volumes:
      - nats-data:/data
    networks:
      - zhushou-net
    restart: unless-stopped

networks:
  zhushou-net:
    driver: overlay
    attachable: true

volumes:
  qdrant-data:
  nats-data:
